name: Build Android App Bundle (TWA)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-aab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clone and configure TWA project
        run: |
          git clone https://github.com/GoogleChromeLabs/svgomg-twa android-project
          cd android-project
          GRADLE_FILE=$(find . -name "*.gradle" | xargs grep -l "jakearchibald" | head -1)
          echo "Gevonden: $GRADLE_FILE"
          sed -i 's|https://jakearchibald.github.io/svgomg/|https://wk2026-g0v5dfgws-roelovergoor.vercel.app/|g' "$GRADLE_FILE"
          sed -i 's|jakearchibald.github.io|wk2026-g0v5dfgws-roelovergoor.vercel.app|g' "$GRADLE_FILE"
          STRINGS_FILE=$(find . -name "strings.xml" | head -1)
          echo "Gevonden: $STRINGS_FILE"
          sed -i 's|SVGOMG|WK 2026 Kaarten|g' "$STRINGS_FILE"

      - name: Build AAB
        run: |
          cd android-project
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: android-project/app/build/outputs/bundle/release/*.aab
