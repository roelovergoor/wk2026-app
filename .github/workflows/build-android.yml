name: Build Android App Bundle (TWA)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-aab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies and build web app
        run: |
          npm install
          npm run build

      - name: Install PWABuilder CLI
        run: npm install -g @pwabuilder/pwabuilder

      - name: Generate Android package
        run: |
          pwabuilder package -p android -u ${{ vars.PWA_URL }} -d ./android-output

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: ./android-output/**/*.aab
