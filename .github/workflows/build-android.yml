name: Build Android App Bundle (TWA)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-aab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clone and configure TWA project
        run: |
          git clone https://github.com/GoogleChromeLabs/svgomg-twa android-project
          cd android-project
          echo "=== app/build.gradle ===" && cat app/build.gradle
          echo "=== strings.xml ===" && find . -name "strings.xml" -exec cat {} \;

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: android-project/app/build/outputs/bundle/release/*.aab
