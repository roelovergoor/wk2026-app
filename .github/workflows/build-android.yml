name: Build Android App Bundle (TWA)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-aab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clone and inspect TWA project
        run: |
          git clone https://github.com/GoogleChromeLabs/svgomg-twa android-project
          cd android-project
          find . -name "*.gradle" | head -20
          find . -name "strings.xml" | head -5
          cat $(find . -name "*.gradle" | head -1)

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: android-project/app/build/outputs/bundle/release/*.aab
