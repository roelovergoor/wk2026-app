name: Build Android App Bundle (TWA)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-aab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies and build web app
        run: |
          npm install
          npm run build

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize TWA project
        run: |
          mkdir -p twa-project
          cd twa-project
          echo '{"host":"${{ vars.PWA_URL }}","name":"WK 2026 Kaarten","launcherName":"WK2026","display":"standalone","themeColor":"#0f172a","backgroundColor":"#0f172a","startUrl":"/","iconUrl":"${{ vars.PWA_URL }}/icon-512.png","maskableIconUrl":"${{ vars.PWA_URL }}/icon-512.png","appVersion":"1","signingMode":"none","generatorApp":"bubblewrap-cli"}' > twa-manifest.json
          bubblewrap init --manifest "${{ vars.PWA_URL }}/manifest.webmanifest" --directory . --skipPwaValidation

      - name: Build Android App Bundle
        run: |
          cd twa-project
          bubblewrap build

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: twa-project/app/build/outputs/bundle/release/*.aab
