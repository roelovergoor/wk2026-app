name: Build Android App Bundle (TWA)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-aab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create TWA Android project
        run: |
          git clone https://github.com/GoogleChromeLabs/svgomg-twa android-project
          cd android-project
          sed -i 's|https://jakearchibald.github.io/svgomg/|https://wk2026-g0v5dfgws-roelovergoor.vercel.app/|g' app/build.gradle
          sed -i 's|jakearchibald.github.io|wk2026-g0v5dfgws-roelovergoor.vercel.app|g' app/build.gradle
          sed -i 's|SVGOMG|WK 2026 Kaarten|g' app/src/main/res/values/strings.xml

      - name: Build AAB
        run: |
          cd android-project
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: android-project/app/build/outputs/bundle/release/*.aab
