name: Build Android App Bundle (TWA)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-aab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies and build web app
        run: |
          npm install
          npm run build

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize TWA project
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          mkdir -p twa-project
          cd twa-project
          echo "n" | bubblewrap init --manifest "${{ vars.PWA_URL }}/manifest.webmanifest" --directory . --skipPwaValidation

      - name: Build Android App Bundle
        run: |
          cd twa-project
          echo "n" | bubblewrap build

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: twa-project/app/build/outputs/bundle/release/*.aab
