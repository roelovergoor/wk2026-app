name: Build Android App Bundle (TWA)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-aab:
    runs-on: ubuntu-latest

    env:
      PWA_MANIFEST: "https://wk2026-g0v5dfgws-roelovergoor.vercel.app/manifest.webmanifest"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies and build web app
        run: |
          npm install
          npm run build

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_SDK_ROOT\"}" > ~/.bubblewrap/config.json

      - name: Initialize TWA project
        run: |
          mkdir -p twa-project
          cd twa-project
          bubblewrap init --manifest "$PWA_MANIFEST" --directory . --skipPwaValidation --jdkPath "$JAVA_HOME" --androidSdkPath "$ANDROID_SDK_ROOT"

      - name: Build Android App Bundle
        run: |
          cd twa-project
          bubblewrap build --skipSigning

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: twa-project/app/build/outputs/bundle/release/*.aab
